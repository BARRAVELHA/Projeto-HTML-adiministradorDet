<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To-Do-List</title>

    <div wm-slider>
        <p>
            <img src="https://www.flowup.me/blog/wp-content/uploads/2023/09/FlowUp-imagens-2023-09-12T103427.967.webp" 
            alt="O Bom Pastor"
            width="513" height="342"
            title="Muro da Cidade por Tarso Bessa">
        </p>
</head>
<body>
    <header>
        <h1>Lista de Tarefas</h1>
        <nav>
            <!-- Links de navegação corrigidos com as âncoras -->
             <a href="">Inicio</a>
             <a href="">Tarefas</a>
             <a href="">Contato</a>
        </nav>
    </header>

    <div id="inicio" class="container">
        <h2>Adicionar nova tarefa</h2>
        <div>
            <!-- input:text#tarefaInput -->
            <input type="text" placeholder="Digite uma tarefa" id="tarefaInput">
            <button onclick="adicionarTarefa()">Adicionar</button>
        </div>

        <ul id="listaTarefas"></ul>
    </div>
    <footer id="Contato">
        <p>&copy; 2026 SENAI. Todos os direitos reservados.</p>
    </footer>
    <script>
        let tarefas = [];

        function adicionarTarefa(){
            const input = document.getElementById('tarefaInput');
            const tarefa = input.value.trim(); // remove espaço desnecessários
            if(tarefa){
                tarefas.push(tarefa);
                input.value = '';
                atualizarLista(); // função que ainda vamos criar
            }
        }

        function removerTarefa(index){
            tarefas.splice(index, 1);
            atualizarLista(); // função que ainda vamos criar
        }

        function atualizarLista(){
            const lista = document.getElementById('listaTarefas');
            lista.innerHTML = '';
            tarefas.forEach((tarefa, index) => {
                const li = document.createElement('li');
                li.innerHTML=`${tarefa} <button 
                    onclick="removerTarefa(${index})">Remover</button>`;
                    lista.appendChild(li);
            });
        }
    </script>
</body>
</html>
