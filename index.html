<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
</head>
<body>
    <header>
        <h1>Lista de Tarefas</h1>
        <nav>
            <!-- links de navegação corrigidas com âncoras -->
             <a href=""Inicio</a>
             <a href=""Tarefas</a>
             <a href=""Contato</a>
        </nav>
    </header>
     
    <div id="inicio" class="container">
        <h2>Adicionar nova tarefa</h2>
        <div>
        <!-- input:text#tarefaInput -->
        <input type="text"  placeholder="Digite uma tarefa" id="tarefaInput">
        <button onclick="adicionarTarefa()
        ">Adicionar</button>
    </div>

    <ul id="ListaTarefas"></ul>
    </div>

    <footer id="COntato">
        <p>&copy; 2026 SENAI. Todos os direito reservador.</p>
    </footer>
    <script>
        let tarefas = [];

        function AdicionarTarefa(){
            const input = document.getElementById('tarefaInput');
            const tarefa = input.value.trim(); // remove espaço desnecessários
            if(tarefa){
                tarefas.push(tarefa);
                input.value = '';
                atualizarLista(); // função que ainda vamos criar
            }
        }

        function removerTarefa(index){
            tarefas.splice(index, 1);
            atualizarLista(); // funçaõ que ainda vamos criar
        }

        function atualizarLista(){
            const lista = document.getElementById('listaTarefas');
            lista.innerHTML = '';
            tarefas.forEach((tarefa, index) => {
                const li = document.createElement('li');
                li.innerHTML='${tarefa}<button onclick="removerTarefa(${index}")>Remover</button>';
            });
        }
    </script>
</body>
</html>
